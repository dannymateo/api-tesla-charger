global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: gateway
    metrics_path: /metrics
    static_configs:
      - targets: ['gateway:3000']
        labels:
          service: gateway

  - job_name: auth-service
    metrics_path: /metrics
    static_configs:
      - targets: ['auth-service:3000']
        labels:
          service: auth-service

  - job_name: stations-service
    metrics_path: /metrics
    static_configs:
      - targets: ['stations-service:3000']
        labels:
          service: stations-service

  - job_name: sessions-service
    metrics_path: /metrics
    static_configs:
      - targets: ['sessions-service:3000']
        labels:
          service: sessions-service

  - job_name: billing-service
    metrics_path: /metrics
    static_configs:
      - targets: ['billing-service:3000']
        labels:
          service: billing-service

  - job_name: notification-service
    metrics_path: /metrics
    static_configs:
      - targets: ['notification-service:3000']
        labels:
          service: notification-service

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
