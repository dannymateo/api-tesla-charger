x-healthcheck-http: &healthcheck-http
  interval: 10s
  timeout: 5s
  retries: 18

x-healthcheck-app: &healthcheck-app
  <<: *healthcheck-http
  start_period: 60s

x-healthcheck-migrate: &healthcheck-migrate
  <<: *healthcheck-http
  start_period: 180s

services:
  rabbitmq:
    build:
      context: ./docker/rabbitmq
      dockerfile: Dockerfile
    image: voltnet-rabbitmq:3.13
    container_name: voltnet-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: voltnet-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  auth-db:
    image: postgres:16-alpine
    container_name: voltnet-auth-db
    environment:
      POSTGRES_USER: ${AUTH_DB_USER:-auth}
      POSTGRES_PASSWORD: ${AUTH_DB_PASS:-auth}
      POSTGRES_DB: ${AUTH_DB_NAME:-auth_db}
    ports:
      - "5433:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
      - ./docker/postgres/auth-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER:-auth} -d ${AUTH_DB_NAME:-auth_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  stations-db:
    image: postgres:16-alpine
    container_name: voltnet-stations-db
    environment:
      POSTGRES_USER: ${STATIONS_DB_USER:-stations}
      POSTGRES_PASSWORD: ${STATIONS_DB_PASS:-stations}
      POSTGRES_DB: ${STATIONS_DB_NAME:-stations_db}
    ports:
      - "5434:5432"
    volumes:
      - stations-db-data:/var/lib/postgresql/data
      - ./docker/postgres/stations-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STATIONS_DB_USER:-stations} -d ${STATIONS_DB_NAME:-stations_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  sessions-db:
    image: postgres:16-alpine
    container_name: voltnet-sessions-db
    environment:
      POSTGRES_USER: ${SESSIONS_DB_USER:-sessions}
      POSTGRES_PASSWORD: ${SESSIONS_DB_PASS:-sessions}
      POSTGRES_DB: ${SESSIONS_DB_NAME:-sessions_db}
    ports:
      - "5435:5432"
    volumes:
      - sessions-db-data:/var/lib/postgresql/data
      - ./docker/postgres/sessions-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SESSIONS_DB_USER:-sessions} -d ${SESSIONS_DB_NAME:-sessions_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  billing-db:
    image: postgres:16-alpine
    container_name: voltnet-billing-db
    environment:
      POSTGRES_USER: ${BILLING_DB_USER:-billing}
      POSTGRES_PASSWORD: ${BILLING_DB_PASS:-billing}
      POSTGRES_DB: ${BILLING_DB_NAME:-billing_db}
    ports:
      - "5436:5432"
    volumes:
      - billing-db-data:/var/lib/postgresql/data
      - ./docker/postgres/billing-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BILLING_DB_USER:-billing} -d ${BILLING_DB_NAME:-billing_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: voltnet-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4318:4318"

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: voltnet-prometheus
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    depends_on:
      gateway:
        condition: service_started
      auth-service:
        condition: service_started
      stations-service:
        condition: service_started
      sessions-service:
        condition: service_started
      billing-service:
        condition: service_started
      notification-service:
        condition: service_started

  grafana:
    image: grafana/grafana:11.3.1
    container_name: voltnet-grafana
    ports:
      - "3030:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: voltnet-gateway
    expose:
      - "3000"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      JWT_SECRET: ${JWT_SECRET:-change_me}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-voltnet}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-voltnet}
      BILLING_WEBHOOK_BASE_URL: http://billing-service:3000
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    healthcheck:
      <<: *healthcheck-app
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/api/v1/health', (r) => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))"]

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: voltnet-auth-service
    depends_on:
      rabbitmq:
        condition: service_healthy
      auth-db:
        condition: service_healthy
      jaeger:
        condition: service_started
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      JWT_SECRET: ${JWT_SECRET:-change_me}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-voltnet}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-voltnet}
      DATABASE_URL: postgresql://${AUTH_DB_USER:-auth}:${AUTH_DB_PASS:-auth}@auth-db:5432/${AUTH_DB_NAME:-auth_db}?schema=public
      HEALTH_PORT: 3000
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    healthcheck:
      <<: *healthcheck-migrate
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/health', (r) => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))"]

  stations-service:
    build:
      context: .
      dockerfile: stations-service/Dockerfile
    container_name: voltnet-stations-service
    depends_on:
      rabbitmq:
        condition: service_healthy
      stations-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-voltnet}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-voltnet}
      DATABASE_URL: postgresql://${STATIONS_DB_USER:-stations}:${STATIONS_DB_PASS:-stations}@stations-db:5432/${STATIONS_DB_NAME:-stations_db}?schema=public
      HEALTH_PORT: 3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    healthcheck:
      <<: *healthcheck-migrate
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/health', (r) => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))"]

  sessions-service:
    build:
      context: .
      dockerfile: sessions-service/Dockerfile
    container_name: voltnet-sessions-service
    depends_on:
      rabbitmq:
        condition: service_healthy
      sessions-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-voltnet}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-voltnet}
      DATABASE_URL: postgresql://${SESSIONS_DB_USER:-sessions}:${SESSIONS_DB_PASS:-sessions}@sessions-db:5432/${SESSIONS_DB_NAME:-sessions_db}?schema=public
      HEALTH_PORT: 3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CHARGE_RATE_KWH_PER_SEC: 5
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    healthcheck:
      <<: *healthcheck-migrate
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/health', (r) => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))"]

  billing-service:
    build:
      context: .
      dockerfile: billing-service/Dockerfile
    container_name: voltnet-billing-service
    depends_on:
      rabbitmq:
        condition: service_healthy
      billing-db:
        condition: service_healthy
      jaeger:
        condition: service_started
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-voltnet}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-voltnet}
      RABBITMQ_HOST: rabbitmq
      DATABASE_URL: postgresql://${BILLING_DB_USER:-billing}:${BILLING_DB_PASS:-billing}@billing-db:5432/${BILLING_DB_NAME:-billing_db}?schema=public
      HEALTH_PORT: 3000
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    healthcheck:
      <<: *healthcheck-migrate
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/health', (r) => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))"]

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: voltnet-notification-service
    depends_on:
      rabbitmq:
        condition: service_healthy
      jaeger:
        condition: service_started
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-voltnet}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-voltnet}
      HEALTH_PORT: 3000
      RABBITMQ_HOST: rabbitmq
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    healthcheck:
      <<: *healthcheck-app
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/health', (r) => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))"]

  seed:
    profiles: [seed]
    build:
      context: .
      dockerfile: docker/seed/Dockerfile
    image: voltnet-seed:latest
    container_name: voltnet-seed
    restart: "no"
    env_file:
      - path: .env
        required: false
    environment:
      AUTH_DATABASE_URL: postgresql://${AUTH_DB_USER:-auth}:${AUTH_DB_PASS:-auth}@auth-db:5432/${AUTH_DB_NAME:-auth_db}?schema=public
      STATIONS_DATABASE_URL: postgresql://${STATIONS_DB_USER:-stations}:${STATIONS_DB_PASS:-stations}@stations-db:5432/${STATIONS_DB_NAME:-stations_db}?schema=public
      SESSIONS_DATABASE_URL: postgresql://${SESSIONS_DB_USER:-sessions}:${SESSIONS_DB_PASS:-sessions}@sessions-db:5432/${SESSIONS_DB_NAME:-sessions_db}?schema=public
      BILLING_DATABASE_URL: postgresql://${BILLING_DB_USER:-billing}:${BILLING_DB_PASS:-billing}@billing-db:5432/${BILLING_DB_NAME:-billing_db}?schema=public
    depends_on:
      auth-db:
        condition: service_healthy
      stations-db:
        condition: service_healthy
      sessions-db:
        condition: service_healthy
      billing-db:
        condition: service_healthy

volumes:
  grafana-data:
  rabbitmq-data:
  redis-data:
  auth-db-data:
  stations-db-data:
  sessions-db-data:
  billing-db-data:
